# Template for local testing overlays (tracked in git). Keep all secrets EMPTY here.
#
# Put real values in configs/real.testing.yml (gitignored), not in this file:
#   cp configs/real.testing.template.yml configs/real.testing.yml
#
# Merge order: develop.yaml → real.testing.yml → real.yml
#
# Polymarket CLOB relayer/builder (or env: POLY_RELAYER_API_KEY, POLY_BUILDER_*).
# Intelligence Dome / Polyfactual (or env: DOME_API_KEY, DOME_BASE_URL, POLYFACTUAL_*).
# Empty base_url → defaults in internal/config/api_base_defaults.go after config.Load.
#
# Optional: override public API URL for terminal / reverse proxy
# server:
#   public_api_base_url: https://polyback.example.com

hft:
  polymarket:
    auth:
      private_key: ""
    relayer_api_key: ""
    builder_api_key: ""
    builder_secret: ""
    builder_passphrase: ""
  limitless:
    base_url: ""
    api_key: ""
    wallet_address: ""
  predict_fun:
    base_url: ""
    api_key: ""
    private_key: ""
  kalshi_dflow:
    base_url: ""
    api_key: ""
    event_ticker: ""

# Intelligence: Dome + Polyfactual (or DOME_API_KEY / POLYFACTUAL_* env)
intelligence:
  dome:
    base_url: ""
    api_key: ""
  polyfactual:
    base_url: ""
    api_key: ""
