name: irys-upload

on:
  push:
    paths:
      - "mm/irys-upload/**"
      - ".github/workflows/irys-upload.yml"
  pull_request:
    paths:
      - "mm/irys-upload/**"
      - ".github/workflows/irys-upload.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mm/irys-upload
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - run: go test ./...
      - run: go build -o /dev/null ./cmd/irys-upload
